apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-api
  labels:
    app: devops-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devops-api
    spec:
      containers:
        - name: api
          image: devopsdemoacr.azurecr.io/devops-api:IMAGE_TAG
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: devops-api-svc
spec:
  selector:
    app: devops-api
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
