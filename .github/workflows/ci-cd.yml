deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group devops-demo-rg --name devops-demo-aks

      - name: Verify images exist in ACR
        run: |
          az acr repository show-tags --name devopsdemoacr --repository devops-api --output tsv
          az acr repository show-tags --name devopsdemoacr --repository devops-ui --output tsv

      - name: Substitute image tag
        run: |
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/api-deployment.yaml
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/ui-deployment.yaml

      - name: Deploy to AKS
        run: kubectl apply -f k8s/

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/devops-api --timeout=120s
          kubectl rollout status deployment/devops-ui --timeout=120s
